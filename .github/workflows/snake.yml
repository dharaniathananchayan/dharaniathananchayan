name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # runs once a day
  workflow_dispatch: {}    # lets you trigger it manually too
  push:
    branches:
      - main               # regenerate whenever you push to main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: dharaniathananchayan
          outputs: |
            assets/github-contribution-grid-snake.svg
            assets/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Generate yearly contribution count
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const username = 'dharaniathananchayan';
            const year = new Date().getUTCFullYear();
            const from = `${year}-01-01T00:00:00Z`;
            const to = `${year}-12-31T23:59:59Z`;

            const result = await github.graphql(`
              query($username: String!, $from: DateTime!, $to: DateTime!) {
                user(login: $username) {
                  contributionsCollection(from: $from, to: $to) {
                    contributionCalendar {
                      totalContributions
                    }
                  }
                }
              }
            `, { username, from, to });

            const total = result.user.contributionsCollection.contributionCalendar.totalContributions;
            const text = `${total.toLocaleString('en-US')} Contributions in ${year}`;
            const escapeXml = value => value.replace(/[&<>"']/g, char => ({
              '&': '&amp;',
              '<': '&lt;',
              '>': '&gt;',
              '"': '&quot;',
              "'": '&apos;'
            }[char]));

            const readmePath = 'README.md';
            const readme = fs.readFileSync(readmePath, 'utf8');
            const marker = /<!-- CONTRIBUTIONS_YEAR:START -->[\s\S]*?<!-- CONTRIBUTIONS_YEAR:END -->/;
            const replacement = `<!-- CONTRIBUTIONS_YEAR:START -->\n<h3 align="center">${escapeXml(text)}</h3>\n<!-- CONTRIBUTIONS_YEAR:END -->`;

            if (!marker.test(readme)) {
              throw new Error('Contribution year markers not found in README.md');
            }

            fs.writeFileSync(readmePath, readme.replace(marker, replacement));

      - name: Commit yearly contribution heading
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update yearly contribution heading [skip ci]"
          git push

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
