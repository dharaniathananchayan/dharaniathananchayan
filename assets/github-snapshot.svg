<svg width="1000" height="540" viewBox="0 0 1000 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub snapshot dashboard</title>
  <desc id="desc">A custom dark analytics dashboard showing Dharania's focus areas across data science, AI, business intelligence, and web development.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset=".48" stop-color="#10172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#c084fc"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fde047"/>
      <stop offset="1" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.28 0 0 0 0 0.7 0 0 0 0 1 0 0 0 .45 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <style>
      .card { fill: rgba(15, 23, 42, .78); stroke: rgba(148, 163, 184, .18); stroke-width: 1; }
      .tiny { font: 500 13px "Inter", "Segoe UI", Arial, sans-serif; fill: #94a3b8; letter-spacing: .2px; }
      .label { font: 700 16px "Inter", "Segoe UI", Arial, sans-serif; fill: #e5e7eb; }
      .title { font: 800 34px "Inter", "Segoe UI", Arial, sans-serif; fill: #f8fafc; }
      .mono { font: 700 15px "Cascadia Code", "Fira Code", Consolas, monospace; fill: #dbeafe; }
      .number { font: 800 28px "Inter", "Segoe UI", Arial, sans-serif; fill: #f8fafc; }
      .pulse { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
      .float { animation: float 4s ease-in-out infinite; transform-origin: center; }
      .float.two { animation-delay: .7s; }
      .float.three { animation-delay: 1.3s; }
      @keyframes pulse {
        0%, 100% { opacity: .75; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.04); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
    </style>
  </defs>

  <rect width="1000" height="540" rx="28" fill="url(#bg)"/>
  <circle cx="900" cy="68" r="104" fill="#0ea5e9" opacity=".10"/>
  <circle cx="132" cy="486" r="122" fill="#22c55e" opacity=".08"/>
  <circle cx="522" cy="258" r="210" fill="#8b5cf6" opacity=".05"/>

  <text x="46" y="64" class="title">Data, AI and Web Snapshot</text>
  <text x="48" y="94" class="tiny">A visual map of my skills, tools, and project direction</text>

  <rect x="46" y="126" width="286" height="160" rx="20" class="card"/>
  <text x="72" y="164" class="label">Focus Stack</text>
  <text x="72" y="195" class="number">4</text>
  <text x="112" y="191" class="tiny">core lanes</text>
  <g transform="translate(72 214)">
    <rect width="214" height="12" rx="6" fill="#1e293b"/>
    <rect width="198" height="12" rx="6" fill="url(#cyan)"/>
    <text x="0" y="36" class="tiny">Data Science</text>
    <text x="154" y="36" class="tiny">92%</text>
  </g>
  <g transform="translate(72 264)">
    <rect width="214" height="12" rx="6" fill="#1e293b"/>
    <rect width="180" height="12" rx="6" fill="url(#violet)"/>
    <text x="0" y="36" class="tiny">AI/ML</text>
    <text x="154" y="36" class="tiny">84%</text>
  </g>

  <rect x="358" y="126" width="286" height="160" rx="20" class="card"/>
  <text x="384" y="164" class="label">Analytics Flow</text>
  <path d="M390 238 C430 182 468 272 508 214 C544 164 582 230 614 182" stroke="url(#green)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="390" cy="238" r="8" fill="#34d399"/>
  <circle cx="508" cy="214" r="8" fill="#22d3ee"/>
  <circle cx="614" cy="182" r="8" fill="#c084fc"/>
  <text x="386" y="258" class="tiny">clean</text>
  <text x="482" y="258" class="tiny">model</text>
  <text x="574" y="258" class="tiny">explain</text>

  <rect x="670" y="126" width="284" height="160" rx="20" class="card"/>
  <text x="696" y="164" class="label">Toolbox</text>
  <g transform="translate(696 188)">
    <rect width="88" height="34" rx="17" fill="#facc15" opacity=".18"/>
    <text x="18" y="23" class="mono" fill="#fde68a">Power BI</text>
    <rect x="98" width="82" height="34" rx="17" fill="#fb923c" opacity=".18"/>
    <text x="118" y="23" class="mono">Tableau</text>
    <rect x="0" y="48" width="82" height="34" rx="17" fill="#22d3ee" opacity=".16"/>
    <text x="18" y="71" class="mono">Pandas</text>
    <rect x="92" y="48" width="78" height="34" rx="17" fill="#34d399" opacity=".16"/>
    <text x="112" y="71" class="mono">NumPy</text>
    <rect x="0" y="96" width="112" height="34" rx="17" fill="#ec4899" opacity=".16"/>
    <text x="18" y="119" class="mono">TensorFlow</text>
    <rect x="122" y="96" width="92" height="34" rx="17" fill="#ef4444" opacity=".16"/>
    <text x="142" y="119" class="mono">PyTorch</text>
  </g>

  <rect x="46" y="314" width="286" height="176" rx="20" class="card"/>
  <text x="72" y="352" class="label">Skill Radar</text>
  <g transform="translate(190 407)">
    <polygon points="0,-70 60,-35 60,35 0,70 -60,35 -60,-35" fill="none" stroke="#334155"/>
    <polygon points="0,-48 42,-24 50,29 0,55 -48,28 -38,-22" fill="url(#violet)" opacity=".62"/>
    <circle r="4" fill="#f8fafc"/>
    <text x="-30" y="-80" class="tiny">ML</text>
    <text x="66" y="-30" class="tiny">BI</text>
    <text x="62" y="45" class="tiny">Web</text>
    <text x="-18" y="92" class="tiny">Data</text>
    <text x="-98" y="46" class="tiny">APIs</text>
    <text x="-104" y="-30" class="tiny">Python</text>
  </g>

  <rect x="358" y="314" width="286" height="176" rx="20" class="card"/>
  <text x="384" y="352" class="label">Project Orbit</text>
  <g transform="translate(500 408)">
    <circle r="66" fill="none" stroke="#334155" stroke-dasharray="5 9"/>
    <circle r="42" fill="none" stroke="#1e293b"/>
    <circle r="22" fill="url(#cyan)" opacity=".28"/>
    <circle r="11" fill="#22d3ee" filter="url(#glow)"/>
    <g class="float">
      <circle cx="-60" cy="-26" r="18" fill="#0f172a" stroke="#34d399" stroke-width="4"/>
      <text x="-76" y="-50" class="tiny">EDA</text>
    </g>
    <g class="float two">
      <circle cx="62" cy="-24" r="18" fill="#0f172a" stroke="#c084fc" stroke-width="4"/>
      <text x="46" y="-50" class="tiny">ML</text>
    </g>
    <g class="float three">
      <circle cx="4" cy="68" r="18" fill="#0f172a" stroke="#fb923c" stroke-width="4"/>
      <text x="-18" y="102" class="tiny">Apps</text>
    </g>
  </g>

  <rect x="670" y="314" width="284" height="176" rx="20" class="card"/>
  <text x="696" y="352" class="label">Build Mode</text>
  <text x="696" y="386" class="mono">insight = data + design</text>
  <text x="696" y="418" class="mono">model = learn(patterns)</text>
  <text x="696" y="450" class="mono">app = ship(impact)</text>
  <rect x="696" y="466" width="220" height="8" rx="4" fill="#1e293b"/>
  <rect x="696" y="466" width="176" height="8" rx="4" fill="url(#amber)" class="pulse"/>
</svg>
