<svg width="900" height="260" viewBox="0 0 900 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mini coding animation</title>
  <desc id="desc">Animated code editor card with moving cursor, floating data science nodes, and progress bars.</desc>
  <style>
    .panel { fill: #0f172a; }
    .bar { fill: #1e293b; }
    .dot-red { fill: #fb7185; }
    .dot-yellow { fill: #facc15; }
    .dot-green { fill: #22c55e; }
    .text { font: 600 18px Consolas, Monaco, monospace; fill: #e5e7eb; }
    .muted { fill: #94a3b8; }
    .blue { fill: #38bdf8; }
    .green { fill: #34d399; }
    .pink { fill: #f472b6; }
    .orange { fill: #fb923c; }
    .cursor {
      animation: blink 1s steps(1, end) infinite;
    }
    .node {
      animation: float 3s ease-in-out infinite;
      transform-origin: center;
    }
    .node.two { animation-delay: .35s; }
    .node.three { animation-delay: .7s; }
    .progress-a {
      animation: growA 3.8s ease-in-out infinite;
      transform-origin: 150px 206px;
    }
    .progress-b {
      animation: growB 3.8s ease-in-out infinite;
      transform-origin: 150px 226px;
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes growA {
      0%, 100% { transform: scaleX(.35); }
      50% { transform: scaleX(1); }
    }
    @keyframes growB {
      0%, 100% { transform: scaleX(.65); }
      50% { transform: scaleX(.25); }
    }
  </style>

  <rect width="900" height="260" rx="18" fill="#020617"/>
  <circle cx="750" cy="42" r="82" fill="#0ea5e9" opacity=".12"/>
  <circle cx="106" cy="218" r="70" fill="#22c55e" opacity=".10"/>

  <rect x="52" y="38" width="548" height="184" rx="14" class="panel"/>
  <rect x="52" y="38" width="548" height="36" rx="14" class="bar"/>
  <circle cx="78" cy="56" r="6" class="dot-red"/>
  <circle cx="98" cy="56" r="6" class="dot-yellow"/>
  <circle cx="118" cy="56" r="6" class="dot-green"/>

  <text x="78" y="108" class="text"><tspan class="pink">def</tspan> turn_data_into(<tspan class="blue">impact</tspan>):</text>
  <text x="106" y="138" class="text muted">insights = analyze(<tspan class="green">"data"</tspan>)</text>
  <text x="106" y="168" class="text muted">model = ML + DeepLearning + BI</text>
  <text x="106" y="198" class="text"><tspan class="orange">return</tspan> smarter_decisions<tspan class="cursor">_</tspan></text>

  <rect x="150" y="206" width="240" height="8" rx="4" fill="#334155"/>
  <rect x="150" y="206" width="240" height="8" rx="4" class="blue progress-a"/>
  <rect x="150" y="226" width="180" height="8" rx="4" fill="#334155"/>
  <rect x="150" y="226" width="180" height="8" rx="4" class="green progress-b"/>

  <g stroke="#38bdf8" stroke-width="3" opacity=".8">
    <line x1="696" y1="92" x2="772" y2="130"/>
    <line x1="696" y1="92" x2="720" y2="176"/>
    <line x1="772" y1="130" x2="720" y2="176"/>
    <line x1="772" y1="130" x2="824" y2="82"/>
  </g>
  <g class="node">
    <circle cx="696" cy="92" r="22" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
    <circle cx="696" cy="92" r="7" fill="#38bdf8"/>
  </g>
  <g class="node two">
    <circle cx="772" cy="130" r="26" fill="#0f172a" stroke="#34d399" stroke-width="4"/>
    <circle cx="772" cy="130" r="8" fill="#34d399"/>
  </g>
  <g class="node three">
    <circle cx="720" cy="176" r="20" fill="#0f172a" stroke="#f472b6" stroke-width="4"/>
    <circle cx="720" cy="176" r="6" fill="#f472b6"/>
  </g>
  <g class="node two">
    <circle cx="824" cy="82" r="18" fill="#0f172a" stroke="#fb923c" stroke-width="4"/>
    <circle cx="824" cy="82" r="5" fill="#fb923c"/>
  </g>

  <text x="620" y="222" font-family="Consolas, Monaco, monospace" font-size="18" font-weight="700" fill="#e5e7eb">Data Science | AI/ML | Python</text>
</svg>
