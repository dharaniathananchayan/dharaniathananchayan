<svg width="900" height="260" viewBox="0 0 900 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mini coding animation</title>
  <desc id="desc">Animated code editor card with moving cursor, floating data science nodes, and progress bars.</desc>
  <defs>
    <!-- Background glows -->
    <radialGradient id="blue-glow" cx="85%" cy="15%" r="60%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="green-glow" cx="15%" cy="85%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="purple-glow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>

    <!-- Progress bar gradients -->
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clipping paths for typing effect -->
    <clipPath id="clip-line1">
      <rect id="clip-rect1" x="78" y="85" width="0" height="30" />
    </clipPath>
    <clipPath id="clip-line2">
      <rect id="clip-rect2" x="106" y="115" width="0" height="30" />
    </clipPath>
    <clipPath id="clip-line3">
      <rect id="clip-rect3" x="106" y="145" width="0" height="30" />
    </clipPath>
    <clipPath id="clip-line4">
      <rect id="clip-rect4" x="106" y="175" width="0" height="30" />
    </clipPath>

    <style>
      .panel { fill: #0b0f19; stroke: #1e293b; stroke-width: 1.5; }
      .bar { fill: #111827; stroke: #1e293b; stroke-width: 1; }
      .dot-red { fill: #ef4444; }
      .dot-yellow { fill: #f59e0b; }
      .dot-green { fill: #10b981; }
      .text { font: 600 18px "Cascadia Code", "Fira Code", "JetBrains Mono", Consolas, monospace; fill: #e2e8f0; }
      .muted { fill: #64748b; }
      .blue { fill: #38bdf8; }
      .green { fill: #34d399; }
      .pink { fill: #f472b6; }
      .orange { fill: #fb923c; }
      
      /* Typing effect styles */
      #clip-rect1 { animation: type-1 12s infinite; }
      #clip-rect2 { animation: type-2 12s infinite; }
      #clip-rect3 { animation: type-3 12s infinite; }
      #clip-rect4 { animation: type-4 12s infinite; }

      @keyframes type-1 {
        0% { width: 0; }
        15%, 90% { width: 300px; }
        95%, 100% { width: 0; }
      }
      @keyframes type-2 {
        0%, 15% { width: 0; }
        35%, 90% { width: 350px; }
        95%, 100% { width: 0; }
      }
      @keyframes type-3 {
        0%, 35% { width: 0; }
        55%, 90% { width: 400px; }
        95%, 100% { width: 0; }
      }
      @keyframes type-4 {
        0%, 55% { width: 0; }
        75%, 90% { width: 350px; }
        95%, 100% { width: 0; }
      }

      /* Glowing Terminal Cursor */
      .cursor {
        animation: cursor-track 12s infinite, cursor-blink 0.8s steps(2, start) infinite;
        filter: drop-shadow(0 0 3px #facc15);
      }
      @keyframes cursor-track {
        /* Line 1 typing */
        0% { transform: translate(78px, 90px); }
        15% { transform: translate(315px, 90px); }
        /* Line 2 typing */
        16% { transform: translate(106px, 120px); }
        35% { transform: translate(445px, 120px); }
        /* Line 3 typing */
        36% { transform: translate(106px, 150px); }
        55% { transform: translate(485px, 150px); }
        /* Line 4 typing */
        56% { transform: translate(106px, 180px); }
        75% { transform: translate(425px, 180px); }
        /* Hold and blink */
        90% { transform: translate(425px, 180px); opacity: 1; }
        /* Reset */
        95%, 100% { transform: translate(78px, 90px); opacity: 0; }
      }
      @keyframes cursor-blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      /* Flow connection lines animation */
      .flow-line {
        stroke-dasharray: 6 12;
        animation: flow-run 5s linear infinite;
      }
      @keyframes flow-run {
        to { stroke-dashoffset: -72; }
      }

      /* Node floats */
      .node.one { animation: float-node1 5s ease-in-out infinite; transform-origin: 696px 92px; }
      .node.two { animation: float-node2 6s ease-in-out infinite; transform-origin: 772px 130px; }
      .node.three { animation: float-node3 5.5s ease-in-out infinite; transform-origin: 720px 176px; }
      .node.four { animation: float-node4 6.5s ease-in-out infinite; transform-origin: 824px 82px; }

      @keyframes float-node1 {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-6px) scale(1.05); }
      }
      @keyframes float-node2 {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(6px) scale(0.95); }
      }
      @keyframes float-node3 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(-4px, -4px) scale(1.03); }
      }
      @keyframes float-node4 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(4px, 4px) scale(0.97); }
      }

      /* Progress Bar Animations */
      .progress-a {
        animation: growA 3.8s ease-in-out infinite;
        transform-origin: 150px 206px;
      }
      .progress-b {
        animation: growB 3.8s ease-in-out infinite;
        transform-origin: 150px 226px;
      }
      @keyframes growA {
        0%, 100% { transform: scaleX(.35); }
        50% { transform: scaleX(1); }
      }
      @keyframes growB {
        0%, 100% { transform: scaleX(.65); }
        50% { transform: scaleX(.25); }
      }
    </style>
  </defs>

  <!-- Background Base -->
  <rect width="900" height="260" rx="18" fill="#020617"/>

  <!-- Radial Mesh Glows -->
  <rect width="900" height="260" rx="18" fill="url(#blue-glow)"/>
  <rect width="900" height="260" rx="18" fill="url(#green-glow)"/>
  <rect width="900" height="260" rx="18" fill="url(#purple-glow)"/>

  <!-- Code Editor Window -->
  <rect x="52" y="38" width="548" height="184" rx="14" class="panel"/>
  <rect x="52" y="38" width="548" height="36" rx="14" class="bar"/>
  <!-- Window Controls -->
  <circle cx="78" cy="56" r="6" class="dot-red"/>
  <circle cx="98" cy="56" r="6" class="dot-yellow"/>
  <circle cx="118" cy="56" r="6" class="dot-green"/>

  <!-- Simulated Code lines with clipping path for typing -->
  <g clip-path="url(#clip-line1)">
    <text x="78" y="108" class="text"><tspan class="pink">def</tspan> build_with(<tspan class="blue">data</tspan>):</text>
  </g>
  <g clip-path="url(#clip-line2)">
    <text x="106" y="138" class="text muted">skills = WebDev + <tspan class="green">"AI/ML"</tspan></text>
  </g>
  <g clip-path="url(#clip-line3)">
    <text x="106" y="168" class="text muted">insights = DataScience + Analytics</text>
  </g>
  <g clip-path="url(#clip-line4)">
    <text x="106" y="198" class="text"><tspan class="orange">return</tspan> intelligent_products</text>
  </g>

  <!-- Glowing Blinking Cursor -->
  <rect class="cursor" width="3" height="18" fill="#facc15"/>

  <!-- Progress Bars -->
  <rect x="150" y="206" width="240" height="8" rx="4" fill="#1e293b"/>
  <rect x="150" y="206" width="240" height="8" rx="4" fill="url(#grad-blue)" class="progress-a"/>
  <rect x="150" y="226" width="180" height="8" rx="4" fill="#1e293b"/>
  <rect x="150" y="226" width="180" height="8" rx="4" fill="url(#grad-green)" class="progress-b"/>

  <!-- Data Flow pipelines (under nodes) -->
  <g stroke="#1e293b" stroke-width="3" opacity="0.6">
    <line x1="696" y1="92" x2="772" y2="130"/>
    <line x1="696" y1="92" x2="720" y2="176"/>
    <line x1="772" y1="130" x2="720" y2="176"/>
    <line x1="772" y1="130" x2="824" y2="82"/>
  </g>
  <!-- Animated pipelines -->
  <g stroke-width="3" stroke-linecap="round" opacity="0.8">
    <line x1="696" y1="92" x2="772" y2="130" stroke="#38bdf8" class="flow-line"/>
    <line x1="696" y1="92" x2="720" y2="176" stroke="#f472b6" class="flow-line" style="animation-delay: -1.2s;"/>
    <line x1="772" y1="130" x2="720" y2="176" stroke="#34d399" class="flow-line" style="animation-delay: -2.4s;"/>
    <line x1="772" y1="130" x2="824" y2="82" stroke="#fb923c" class="flow-line" style="animation-delay: -3.6s;"/>
  </g>

  <!-- Network Nodes -->
  <g class="node one">
    <circle cx="696" cy="92" r="22" fill="#0b0f19" stroke="#38bdf8" stroke-width="3" filter="url(#softGlow)"/>
    <circle cx="696" cy="92" r="7" fill="#38bdf8"/>
  </g>
  <g class="node two">
    <circle cx="772" cy="130" r="26" fill="#0b0f19" stroke="#34d399" stroke-width="3" filter="url(#softGlow)"/>
    <circle cx="772" cy="130" r="8" fill="#34d399"/>
  </g>
  <g class="node three">
    <circle cx="720" cy="176" r="20" fill="#0b0f19" stroke="#f472b6" stroke-width="3" filter="url(#softGlow)"/>
    <circle cx="720" cy="176" r="6" fill="#f472b6"/>
  </g>
  <g class="node four">
    <circle cx="824" cy="82" r="18" fill="#0b0f19" stroke="#fb923c" stroke-width="3" filter="url(#softGlow)"/>
    <circle cx="824" cy="82" r="5" fill="#fb923c"/>
  </g>

  <!-- Dynamic text labels -->
  <text x="772" y="222" text-anchor="middle" font-family="Cascadia Code, Fira Code, JetBrains Mono, Consolas, monospace" font-size="14" font-weight="700" fill="#e2e8f0">Web Development / AI/ML</text>
  <text x="772" y="242" text-anchor="middle" font-family="Cascadia Code, Fira Code, JetBrains Mono, Consolas, monospace" font-size="14" font-weight="700" fill="#94a3b8">Data Science</text>
</svg>
