<svg width="1000" height="360" viewBox="0 0 1000 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tower of Hanoi Visualizer</title>
  <desc id="desc">Animated dashboard solving the classic recursive Tower of Hanoi puzzle with 3 disks, demonstrating lift, slide, and drop movements in optimal steps.</desc>
  <defs>
    <!-- Background Card Gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.5" stop-color="#050814"/>
      <stop offset="1" stop-color="#0a0f24"/>
    </linearGradient>

    <!-- Mesh glows behind pegs -->
    <radialGradient id="left-glow" cx="250" cy="180" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="right-glow" cx="750" cy="180" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.6" opacity="0.2"/>
    </pattern>

    <!-- Disk Gradients -->
    <linearGradient id="grad-disk1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="grad-disk2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="grad-disk3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>

    <!-- Soft Glow Filter -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .peg-label { font: 800 10px "Inter", sans-serif; fill: #475569; letter-spacing: 1px; }
      .console-label { font: 800 10px "Cascadia Code", "Fira Code", monospace; fill: #475569; }
      .status-msg { font: 600 13px "Cascadia Code", "Fira Code", monospace; text-anchor: middle; opacity: 0; }

      /* Disk Animations (16s cycle) */
      .disk-1 { animation: disk1-move 16s cubic-bezier(0.4, 0, 0.2, 1) infinite; transform-box: fill-box; }
      .disk-2 { animation: disk2-move 16s cubic-bezier(0.4, 0, 0.2, 1) infinite; transform-box: fill-box; }
      .disk-3 { animation: disk3-move 16s cubic-bezier(0.4, 0, 0.2, 1) infinite; transform-box: fill-box; }

      /* Disk 1 trajectory (Smallest) */
      @keyframes disk1-move {
        0%, 8% { transform: translate(0px, 0px); }
        11% { transform: translate(0px, -132px); }
        15% { transform: translate(500px, -132px); }
        18%, 32% { transform: translate(500px, 44px); }
        35% { transform: translate(500px, -132px); }
        39% { transform: translate(250px, -132px); }
        42%, 56% { transform: translate(250px, 22px); }
        59% { transform: translate(250px, -132px); }
        63% { transform: translate(0px, -132px); }
        66%, 80% { transform: translate(0px, 44px); }
        83% { transform: translate(0px, -132px); }
        87% { transform: translate(500px, -132px); }
        90%, 96% { transform: translate(500px, 0px); }
        100% { transform: translate(0px, 0px); }
      }

      /* Disk 2 trajectory (Medium) */
      @keyframes disk2-move {
        0%, 20% { transform: translate(0px, 0px); }
        23% { transform: translate(0px, -154px); }
        27% { transform: translate(250px, -154px); }
        30%, 68% { transform: translate(250px, 22px); }
        71% { transform: translate(250px, -154px); }
        75% { transform: translate(500px, -154px); }
        78%, 96% { transform: translate(500px, 0px); }
        100% { transform: translate(0px, 0px); }
      }

      /* Disk 3 trajectory (Largest) */
      @keyframes disk3-move {
        0%, 44% { transform: translate(0px, 0px); }
        47% { transform: translate(0px, -176px); }
        51% { transform: translate(500px, -176px); }
        54%, 96% { transform: translate(500px, 0px); }
        100% { transform: translate(0px, 0px); }
      }

      /* Status Telemetry Keyframes */
      .stat-0 { animation: stat0-show 16s infinite; fill: #64748b; }
      .stat-1 { animation: stat1-show 16s infinite; fill: #22d3ee; }
      .stat-2 { animation: stat2-show 16s infinite; fill: #818cf8; }
      .stat-3 { animation: stat3-show 16s infinite; fill: #22d3ee; }
      .stat-4 { animation: stat4-show 16s infinite; fill: #fb7185; }
      .stat-5 { animation: stat5-show 16s infinite; fill: #22d3ee; }
      .stat-6 { animation: stat6-show 16s infinite; fill: #818cf8; }
      .stat-7 { animation: stat7-show 16s infinite; fill: #22d3ee; }
      .stat-8 { animation: stat8-show 16s infinite; fill: #34d399; }
      .stat-9 { animation: stat9-show 16s infinite; fill: #fb923c; }

      @keyframes stat0-show { 0%, 7.9% { opacity: 1; } 8%, 100% { opacity: 0; } }
      @keyframes stat1-show { 0%, 7.9% { opacity: 0; } 8%, 17.9% { opacity: 1; } 18%, 100% { opacity: 0; } }
      @keyframes stat2-show { 0%, 17.9% { opacity: 0; } 18%, 31.9% { opacity: 1; } 32%, 100% { opacity: 0; } }
      @keyframes stat3-show { 0%, 31.9% { opacity: 0; } 32%, 43.9% { opacity: 1; } 44%, 100% { opacity: 0; } }
      @keyframes stat4-show { 0%, 43.9% { opacity: 0; } 44%, 55.9% { opacity: 1; } 56%, 100% { opacity: 0; } }
      @keyframes stat5-show { 0%, 55.9% { opacity: 0; } 56%, 67.9% { opacity: 1; } 68%, 100% { opacity: 0; } }
      @keyframes stat6-show { 0%, 67.9% { opacity: 0; } 68%, 79.9% { opacity: 1; } 80%, 100% { opacity: 0; } }
      @keyframes stat7-show { 0%, 79.9% { opacity: 0; } 80%, 91.9% { opacity: 1; } 92%, 100% { opacity: 0; } }
      @keyframes stat8-show { 0%, 91.9% { opacity: 0; } 92%, 95.9% { opacity: 1; } 96%, 100% { opacity: 0; } }
      @keyframes stat9-show { 0%, 95.9% { opacity: 0; } 96%, 100% { opacity: 1; } }
    </style>
  </defs>

  <!-- Background Base Card -->
  <rect width="1000" height="360" rx="24" fill="url(#bg)" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Grid overlay -->
  <rect width="1000" height="360" rx="24" fill="url(#grid)" />

  <!-- Mesh Glows -->
  <rect width="1000" height="360" rx="24" fill="url(#left-glow)"/>
  <rect width="1000" height="360" rx="24" fill="url(#right-glow)"/>

  <!-- Left Header Titles -->
  <text x="50" y="44" font-family="Outfit, Inter, sans-serif" font-size="18" font-weight="800" fill="#f8fafc" letter-spacing="-0.5px">Tower of Hanoi Solver</text>
  <text x="50" y="60" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#475569">Optimal 3-disk recursive algorithm execution (2^3 - 1 = 7 steps)</text>

  <!-- ================= PEGS AND BASEBOARD ================= -->
  <!-- Baseboard -->
  <rect x="100" y="278" width="800" height="24" rx="12" fill="#0b0f19" stroke="#1e293b" stroke-width="2"/>
  <rect x="104" y="282" width="792" height="6" rx="3" fill="#1e293b" opacity="0.5"/>

  <!-- Pegs -->
  <!-- Peg A (Left - Source) -->
  <rect x="247" y="110" width="6" height="170" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="250" y="320" class="peg-label" text-anchor="middle">[ PEG A: SOURCE ]</text>

  <!-- Peg B (Middle - Auxiliary) -->
  <rect x="497" y="110" width="6" height="170" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="500" y="320" class="peg-label" text-anchor="middle">[ PEG B: AUXILIARY ]</text>

  <!-- Peg C (Right - Destination) -->
  <rect x="747" y="110" width="6" height="170" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="750" y="320" class="peg-label" text-anchor="middle">[ PEG C: DESTINATION ]</text>

  <!-- ================= THE DISKS (Bottom-To-Top) ================= -->
  <!-- Disk 3 (Large) -->
  <rect class="disk-3" x="155" y="256" width="190" height="22" rx="11" fill="url(#grad-disk3)" filter="url(#softGlow)"/>

  <!-- Disk 2 (Medium) -->
  <rect class="disk-2" x="180" y="234" width="140" height="22" rx="11" fill="url(#grad-disk2)" filter="url(#softGlow)"/>

  <!-- Disk 1 (Small) -->
  <rect class="disk-1" x="205" y="212" width="90" height="22" rx="11" fill="url(#grad-disk1)" filter="url(#softGlow)"/>


  <!-- ================= TELEMETRY CONSOLE PANEL ================= -->
  <rect x="250" y="312" width="500" height="30" rx="6" fill="#070a13" stroke="#1e293b" stroke-width="1"/>
  <circle cx="264" cy="327" r="4" fill="#ef4444"/>
  <circle cx="274" cy="327" r="4" fill="#f59e0b"/>
  <circle cx="284" cy="327" r="4" fill="#10b981"/>
  
  <text x="302" y="331" class="console-label">LOGS:</text>

  <!-- Telmetry logs -->
  <g>
    <text class="status-msg stat-0" x="500" y="331">&gt; State 0/7: Initializing stack on Source peg...</text>
    <text class="status-msg stat-1" x="500" y="331">&gt; Move 1: Disk 1 (Small) [Source] - - &gt; [Destination]</text>
    <text class="status-msg stat-2" x="500" y="331">&gt; Move 2: Disk 2 (Medium) [Source] - - &gt; [Auxiliary]</text>
    <text class="status-msg stat-3" x="500" y="331">&gt; Move 3: Disk 1 (Small) [Destination] - - &gt; [Auxiliary]</text>
    <text class="status-msg stat-4" x="500" y="331">&gt; Move 4: Disk 3 (Large) [Source] - - &gt; [Destination]</text>
    <text class="status-msg stat-5" x="500" y="331">&gt; Move 5: Disk 1 (Small) [Auxiliary] - - &gt; [Source]</text>
    <text class="status-msg stat-6" x="500" y="331">&gt; Move 6: Disk 2 (Medium) [Auxiliary] - - &gt; [Destination]</text>
    <text class="status-msg stat-7" x="500" y="331">&gt; Move 7: Disk 1 (Small) [Source] - - &gt; [Destination]</text>
    <text class="status-msg stat-8" x="500" y="331">&gt; Success: Recursion completed in 7 moves! [Hold]</text>
    <text class="status-msg stat-9" x="500" y="331">&gt; Resetting towers...</text>
  </g>
</svg>
